{% extends "base.html" %}

{% block title %}ログイン - Manabu {% endblock %}
{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css')}}">
{% endblock %}

{% block content %}
<div class="page-auth">
    <main class="page-auth-main">
        <div class~"auth-wrapper">
            <div class ="card">
                <div class="card-header">
                    <h2 class="auth-title">ログイン</h2>
                    <p class="card-subtitle">
                        メールアドレスとパスワードを入力してログインして下さい。
                    </p>
            </div>
        </div>
    </main>
</div>
<!-- サンプルアプリを参考にしながら進める（cmd+/　でコメントアウト） -->
