<!DOCTYPE html>                                                             <!--html5で記述する-->
<html lang="ja">                                                            <!--ドキュメント言語を日本語に指定-->

<head>
    <meta charset="UTF-8">                                                  <!--文字エンコードをUTF-8に指定-->
    <title>{% block title %}マナ部{% endblock %}</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">   <!--画面サイズをデバイスサイズに合わせて最適化-->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css')}}">       
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css')}}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon-96_96.png') }}"> <!-- ファビコン：ブラウザタブにウサギ！ -->
    {% block page_css %}{% endblock %}                      <!--ページ毎のcssファイル用のblockです-->
</head>

<body>
    {% include 'common/header.html' %}                          

    {% block content %}{% endblock %}          <!--main部分のblockです-->

    <!--フッターは２つファイルを作成するので、mainにそれぞれincludeしてください-->
    <!--(マイページはfooter_mypage.html、投稿詳細・バトン画面・ランキングはfooter_mypageback.htmlをincludeしてください)-->
    <!-- ログインした後に動かす -->
    {% if session.get('user_id') %}
        <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js" integrity="sha512-q/dWJ3kcmjBLU4Qc47E4A9kTB4m3wuTY7vkFJDTZKjTs8jhyGQnaUrxa0Ytd0ssMZhbNua9hE+E7Qv1j+DyZwA==" crossorigin="anonymous"></script>
        <script src="{{url_for('static', filename='js/socket.js')}}"></script>
    {% endif %}
    {% block scripts %}{% endblock %}
</body>

</html>
